name: onechat
description: OneChat - One Hour. One Chance. One Real Connection.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.2.0
  firebase_messaging: ^15.1.0
  google_sign_in: ^6.2.1
  # Media & voice
  record: ^5.1.1
  just_audio: ^0.9.36
  audio_waveforms: ^1.1.2
  path_provider: ^2.1.4
  # Location & permissions
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  # Payments (choose per region)
  razorpay_flutter: ^1.3.6
  flutter_stripe: ^11.1.0
  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.0
  flutter_local_notifications: ^17.2.1+2
  timezone: ^0.9.2

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/audio/


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0